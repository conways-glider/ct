name: Release
on:
  push:
    tags:
    - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  build-release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        build: [linux-386, linux-amd64, linux-arm, linux-arm64, darwin-amd64, darwin-arm64, windows-amd64, windows-arm64]
        include:
        - build: linux-386
          os: ubuntu-latest
          goos: linux
          goarch: 386
          disable_cgo: true
        - build: linux-amd64
          os: ubuntu-latest
          goos: linux
          goarch: amd64
          disable_cgo: true
        - build: linux-arm
          os: ubuntu-latest
          goos: linux
          goarch: arm
          disable_cgo: true
        - build: linux-arm64
          os: ubuntu-latest
          goos: linux
          goarch: arm64
          disable_cgo: true
        - build: darwin-amd64
          os: macos-latest
          goos: darwin
          goarch: amd64
        - build: darwin-arm64
          os: macos-latest
          goos: darwin
          goarch: arm64
        - build: windows-amd64
          os: windows-latest
          goos: windows
          goarch: amd64
          disable_cgo: true
        - build: windows-arm64
          os: windows-latest
          goos: windows
          goarch: arm64
          cgo_enabled:
          disable_cgo: true
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Go
        uses: actions/setup-go@v3
        with:
          go-version: '^1.18'
      - name: Test
        run: make test
      - name: Set VERSION
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
      - name: Set CGO_ENABLED=0 if needed
        if: ${{ matrix.disable_cgo }}
        shell: bash
        run: echo "CGO_ENABLED=0" >> $GITHUB_ENV
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: make release
      - name: Package
        shell: bash
        run: |
          name="ct_${{ env.VERSION }}_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "$name"
          cp {README.md,LICENSE-APACHE,LICENSE-MIT} "$name/"
          cp ./bin/. "$name/"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a "${name}.zip" "${name}"
            echo "ASSET=${name}.zip" >> $GITHUB_ENV
          else
            tar -czf "${name}.tar.gz" "./${name}"
            echo "ASSET=${name}.tar.gz" >> $GITHUB_ENV
          fi
      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ env.ASSET }}
          generate_release_notes: true
